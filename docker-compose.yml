services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    expose:
      - "3000"
    volumes:
      - ./.data:/app/.data
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    networks:
      - app-network
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET}
      WORKER_URL: http://app:3000/api/ai/system/autonomy/worker
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
