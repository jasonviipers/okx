services:
  redis:
    image: redis:8.6-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy   # wait until redis-cli ping succeeds
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    expose:
      - "3000"
    volumes:
      - ./.data:/app/.data
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      app:
        condition: service_started
    networks:
      - app-network
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      CRON_SECRET: ${CRON_SECRET}
      WORKER_URL: http://app:3000/api/ai/system/autonomy/worker
    networks:
      - app-network
    restart: unless-stopped

volumes:
  redis-data:

networks:
  app-network:
    driver: bridge