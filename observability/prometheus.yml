global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "platform-app"
    static_configs:
      - targets: ["app:3000"]
    metrics_path: "/metrics"

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "minio"
    static_configs:
      - targets: ["minio:9000"]
    metrics_path: "/minio/v2/metrics/cluster"

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
